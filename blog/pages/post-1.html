<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Blog Post - Đặng Minh Sang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div id="header"></div>

    <main class="container">
        <article class="blog-post-full">
            <h2 class="section-title">First Blog on Page</h2>
            <p>Hello Word on First Blog</p>
            
            <h3>Code Blocks</h3>
            <p>You can include code blocks like this:</p>
            <pre><code>
#include &lt;iostream&gt;

int main() {
    std::cout << "Hello, World!" << std::endl;
    return 0;
}
            </code></pre>

            <h3>Images</h3>
            <p>You can also include images in your posts:</p>
            <img src="https://tse2.mm.bing.net/th/id/OIP.N_N_ae71mFkzul2PUg-UfgHaFP?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Placeholder Image" style="max-width: 100%; height: auto; border-radius: 10px;">

        </article>
    </main>

    <div id="footer"></div>

    <a href="#" class="scroll-to-top">↑</a>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="../../script.js"></script>
    <script>
        loadHTML("header", "../../components/header.html");
        loadHTML("footer", "../../components/footer.html");
    </script>
</body>
</html>
